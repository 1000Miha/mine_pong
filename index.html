<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mine Pong</title>
    <style>
        body {
            margin: 0;
            background-color: #000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 16px 10px;
            box-sizing: border-box;
            font-family: "Courier New", Courier, monospace;
            color: white;
        }

        /* Top Bar Container */
        #top-header {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 20px;
            z-index: 20;
        }

        #channel-label {
            font-size: 18px;
            color: #ffff55;
            margin-bottom: 8px;
            text-shadow: 2px 2px #3f3f00;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        #top-nav {
            display: flex;
            gap: 20px;
        }

        .yt-link-btn {
            padding: 8px 16px;
            background: #5e5e5e;
            border: 4px solid #000;
            box-shadow: inset -4px -4px #333, inset 4px 4px #aaa;
            display: flex;
            align-items: center;
            transition: transform 0.1s;
            text-decoration: none;
        }

        .yt-link-btn:active {
            transform: translateY(2px);
            box-shadow: inset -2px -2px #333, inset 2px 2px #aaa;
        }

        .yt-link-btn img {
            height: 24px;
            width: auto;
        }

        #game-container {
            position: relative;
            border: 8px solid #373737;
            box-shadow: 0 0 0 2px #111;
            padding-top: 74px;
        }

        #ui-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 74px;
            background: rgba(0, 0, 0, 0.72);
            border-bottom: 2px solid #555;
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            align-items: center;
            pointer-events: none;
            z-index: 5;
        }
        .stat-box {
            text-align: center;
            line-height: 1.2;
        }
        .stat-label {
            display: block;
            font-size: 11px;
            letter-spacing: 1px;
            color: #c4c4c4;
        }
        .stat-val {
            color: #ffff55;
            font-size: 20px;
            font-weight: bold;
        }
        #screen {
            position: absolute;
            top: 74px;
            left: 0;
            width: 100%;
            height: calc(100% - 74px);
            background: rgba(0, 0, 0, 0.85);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
            text-align: center;
            padding: 10px;
            box-sizing: border-box;
        }
        #status-text {
            margin-bottom: 16px;
            font-size: 16px;
            color: #d0d0d0;
        }
        button,
        select {
            padding: 10px 18px;
            font-size: 18px;
            font-family: "Courier New", Courier, monospace;
            background: #5e5e5e;
            color: #fff;
            border: 4px solid #000;
            cursor: pointer;
            box-shadow: inset -4px -4px #333, inset 4px 4px #aaa;
        }
        button:active {
            box-shadow: inset -2px -2px #333, inset 2px 2px #aaa;
            transform: translateY(1px);
        }
        select {
            padding-right: 10px;
        }
        canvas {
            background-image: url("https://static.wikia.nocookie.net/minecraft_gamepedia/images/7/7b/Mossy_Stone_Bricks_%28texture%29_JE3_BE2.png");
            background-repeat: repeat;
            background-size: 64px;
            image-rendering: pixelated;
            display: block;
            touch-action: none;
        }
        #controls-panel {
            display: flex;
            align-items: center;
            justify-content: center;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 12px;
        }
        .control-label {
            color: #d2d2d2;
            font-size: 14px;
            margin-left: 6px;
        }
        #touch-controls {
            margin-top: 8px;
            display: none;
            gap: 12px;
        }
        .touch-btn {
            min-width: 120px;
        }
        #help {
            margin-top: 8px;
            color: #c7c7c7;
            font-size: 14px;
            text-align: center;
        }
        h1 {
            font-size: 58px;
            margin: 0;
            color: #ffffff;
            text-shadow: 4px 4px #373737;
        }
        #splash {
            color: #ffff55;
            font-size: 20px;
            margin-bottom: 16px;
            font-weight: bold;
            text-shadow: 2px 2px #3f3f00;
            transform: rotate(-5deg);
        }
        #countdown {
            position: absolute;
            top: 74px;
            left: 0;
            width: 100%;
            height: calc(100% - 74px);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 72px;
            color: #ffff55;
            text-shadow: 4px 4px #3f3f00;
            background: rgba(0, 0, 0, 0.35);
            z-index: 9;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.12s ease-in;
        }
        #countdown.show {
            opacity: 1;
        }
        #pong.shake {
            animation: shake 0.22s;
        }
        @keyframes shake {
            0% { transform: translate(0, 0); }
            25% { transform: translate(3px, -2px); }
            50% { transform: translate(-3px, 2px); }
            75% { transform: translate(2px, -1px); }
            100% { transform: translate(0, 0); }
        }
        @media (max-width: 900px) {
            #game-container {
                transform: scale(0.86);
                transform-origin: top center;
            }
        }
        @media (max-width: 760px) {
            #game-container {
                transform: scale(0.72);
            }
        }
        @media (hover: none), (pointer: coarse) {
            #touch-controls {
                display: flex;
            }
        }
    </style>
</head>
<body>

    <div id="top-header">
        <div id="channel-label">my channels:</div>
        <div id="top-nav">
            <a href="https://www.youtube.com/@mr_random_schooI" target="_blank" class="yt-link-btn">
                <img src="https://upload.wikimedia.org/wikipedia/commons/e/ef/Youtube_logo.png" alt="YouTube Link 1">
            </a>
            <a href="https://www.youtube.com/@miha_24858" target="_blank" class="yt-link-btn">
                <img src="https://upload.wikimedia.org/wikipedia/commons/e/ef/Youtube_logo.png" alt="YouTube Link 2">
            </a>
        </div>
    </div>

    <div id="game-container">
        <div id="ui-overlay">
            <div class="stat-box"><span class="stat-label">WINS</span><span id="wins" class="stat-val">0</span></div>
            <div class="stat-box"><span class="stat-label">LOSSES</span><span id="losses" class="stat-val">0</span></div>
            <div class="stat-box"><span class="stat-label">HITS</span><span id="hits" class="stat-val">0</span></div>
            <div class="stat-box"><span class="stat-label">BEST WINS</span><span id="best-wins" class="stat-val">0</span></div>
            <div class="stat-box"><span class="stat-label">BEST HITS</span><span id="best-hits" class="stat-val">0</span></div>
        </div>

        <div id="screen">
            <h1>MINE PONG</h1>
            <div id="splash"></div>
            <div id="status-text">Ready to play? Press START.</div>
            <button id="start-btn" type="button">START</button>
        </div>

        <div id="countdown"></div>

        <canvas id="pong" width="800" height="512"></canvas>
    </div>

    <div id="controls-panel">
        <button id="pause-btn" type="button">PAUSE</button>
        <button id="restart-btn" type="button">RESTART</button>
        <button id="mute-btn" type="button">SOUND: ON</button>
        <button id="reset-best-btn" type="button">RESET BEST</button>
        <span class="control-label">DIFFICULTY</span>
        <select id="difficulty" aria-label="Difficulty">
            <option value="easy">Easy</option>
            <option value="normal" selected>Normal</option>
            <option value="hard">Hard</option>
        </select>
        <span class="control-label">MODE</span>
        <select id="mode" aria-label="Mode">
            <option value="endless">Endless</option>
            <option value="five">First to 5</option>
            <option value="ten">First to 10</option>
        </select>
    </div>

    <div id="touch-controls">
        <button id="touch-up" class="touch-btn" type="button">UP</button>
        <button id="touch-down" class="touch-btn" type="button">DOWN</button>
    </div>

    <div id="help">Controls: mouse, W/S, arrow keys, touch buttons, Space to pause, M to mute.</div>

    <script>
        const BEST_STATS_KEY = "minePongBestStatsV1";
        const SETTINGS_KEY = "minePongSettingsV1";

        const canvas = document.getElementById("pong");
        const ctx = canvas.getContext("2d");
        const screen = document.getElementById("screen");
        const splashEl = document.getElementById("splash");
        const statusText = document.getElementById("status-text");
        const countdownEl = document.getElementById("countdown");

        const winsEl = document.getElementById("wins");
        const lossesEl = document.getElementById("losses");
        const hitsEl = document.getElementById("hits");
        const bestWinsEl = document.getElementById("best-wins");
        const bestHitsEl = document.getElementById("best-hits");

        const startBtn = document.getElementById("start-btn");
        const pauseBtn = document.getElementById("pause-btn");
        const restartBtn = document.getElementById("restart-btn");
        const muteBtn = document.getElementById("mute-btn");
        const resetBestBtn = document.getElementById("reset-best-btn");
        const difficultySelect = document.getElementById("difficulty");
        const modeSelect = document.getElementById("mode");

        const touchUpBtn = document.getElementById("touch-up");
        const touchDownBtn = document.getElementById("touch-down");

        const snowballImg = new Image();
        snowballImg.src = "https://minecraft.wiki/images/Snowball_JE3_BE3.png?8c074";
        const ironImg = new Image();
        ironImg.src = "https://minecraft.wiki/images/Block_of_Iron_%28texture%29_JE3_BE3.png?4a8c5";

        const splashes = [
            "win, lose, who cares?",
            "SNOWBALLS!!!",
            "made by a genius, maybe not",
            "touch grass"
        ];

        const difficultyConfig = {
            easy: { aiSpeed: 3.2, ballStartSpeed: 5.0, maxBallSpeed: 8.0 },
            normal: { aiSpeed: 4.2, ballStartSpeed: 6.0, maxBallSpeed: 10.5 },
            hard: { aiSpeed: 5.3, ballStartSpeed: 6.7, maxBallSpeed: 12.0 }
        };

        let gameState = "MENU";
        let stats = { wins: 0, losses: 0, hits: 0 };
        let bestStats = loadBestStats();
        let settings = loadSettings();
        let activeDifficulty = settings.difficulty;
        let matchTarget = settings.matchTarget;
        let audioEnabled = settings.audioEnabled;
        let resetOnStart = false;
        let countdownTimer = null;
        let audioCtx = null;

        const controls = {
            up: false,
            down: false,
            touchUp: false,
            touchDown: false
        };

        const player = { x: 20, y: 192, h: 128, w: 32, speed: 8 };
        const ai = { x: 748, y: 192, h: 128, w: 32 };
        const ball = { x: 400, y: 256, vx: 0, vy: 0, size: 28 };

        function sanitizeScore(value) {
            return Number.isFinite(value) && value > 0 ? Math.floor(value) : 0;
        }

        function loadBestStats() {
            try {
                const raw = localStorage.getItem(BEST_STATS_KEY);
                if (!raw) return { wins: 0, hits: 0 };
                const parsed = JSON.parse(raw);
                return {
                    wins: sanitizeScore(parsed.wins),
                    hits: sanitizeScore(parsed.hits)
                };
            } catch (e) {
                return { wins: 0, hits: 0 };
            }
        }

        function loadSettings() {
            try {
                const raw = localStorage.getItem(SETTINGS_KEY);
                if (!raw) {
                    return { audioEnabled: true, difficulty: "normal", matchTarget: "endless" };
                }
                const parsed = JSON.parse(raw);
                return {
                    audioEnabled: parsed.audioEnabled !== false,
                    difficulty: typeof parsed.difficulty === "string" ? parsed.difficulty : "normal",
                    matchTarget: typeof parsed.matchTarget === "string" ? parsed.matchTarget : "endless"
                };
            } catch (e) {
                return { audioEnabled: true, difficulty: "normal", matchTarget: "endless" };
            }
        }

        function saveBestStats() {
            localStorage.setItem(BEST_STATS_KEY, JSON.stringify(bestStats));
        }

        function saveSettings() {
            localStorage.setItem(SETTINGS_KEY, JSON.stringify(settings));
        }

        function updateBestStat(key, value) {
            if (value > bestStats[key]) {
                bestStats[key] = value;
                saveBestStats();
            }
        }

        function renderStats() {
            winsEl.innerText = stats.wins;
            lossesEl.innerText = stats.losses;
            hitsEl.innerText = stats.hits;
            bestWinsEl.innerText = bestStats.wins;
            bestHitsEl.innerText = bestStats.hits;
        }

        function normalizeSettings() {
            if (!difficultyConfig[activeDifficulty]) activeDifficulty = "normal";
            const validModes = ["endless", "five", "ten"];
            if (!validModes.includes(matchTarget)) matchTarget = "endless";
            settings = {
                audioEnabled: audioEnabled !== false,
                difficulty: activeDifficulty,
                matchTarget: matchTarget
            };
            saveSettings();
        }

        function applySettingsToUI() {
            difficultySelect.value = activeDifficulty;
            modeSelect.value = matchTarget;
            muteBtn.innerText = audioEnabled ? "SOUND: ON" : "SOUND: OFF";
        }

        function getMatchTarget() {
            if (matchTarget === "five") return 5;
            if (matchTarget === "ten") return 10;
            return null;
        }

        function ensureAudioContext() {
            if (!audioEnabled) return null;
            if (!audioCtx) {
                const Ctx = window.AudioContext || window.webkitAudioContext;
                if (!Ctx) return null;
                audioCtx = new Ctx();
            }
            if (audioCtx.state === "suspended") {
                audioCtx.resume().catch(() => {});
            }
            return audioCtx;
        }

        function playTone(freq, duration, type = "square", volume = 0.05) {
            if (!audioEnabled) return;
            const ctx = ensureAudioContext();
            if (!ctx) return;
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();
            osc.type = type;
            osc.frequency.value = freq;
            gain.gain.value = volume;
            osc.connect(gain).connect(ctx.destination);
            osc.start();
            osc.stop(ctx.currentTime + duration);
        }

        function triggerShake() {
            canvas.classList.remove("shake");
            void canvas.offsetWidth;
            canvas.classList.add("shake");
        }

        function showCountdown(text) {
            countdownEl.textContent = text;
            countdownEl.classList.add("show");
        }

        function hideCountdown() {
            countdownEl.classList.remove("show");
            countdownEl.textContent = "";
        }

        function beginServeCountdown() {
            if (countdownTimer) {
                clearInterval(countdownTimer);
                countdownTimer = null;
            }
            gameState = "COUNTDOWN";
            const steps = ["3", "2", "1", "GO!"];
            let idx = 0;
            showCountdown(steps[idx]);
            playTone(320, 0.05);
            countdownTimer = setInterval(() => {
                idx += 1;
                if (idx >= steps.length) {
                    clearInterval(countdownTimer);
                    countdownTimer = null;
                    hideCountdown();
                    gameState = "PLAYING";
                    return;
                }
                showCountdown(steps[idx]);
                playTone(idx === steps.length - 1 ? 660 : 320, 0.06);
                if (steps[idx] === "GO!") {
                    setTimeout(() => {
                        if (gameState === "COUNTDOWN") hideCountdown();
                    }, 250);
                }
            }, 600);
        }

        function setRandomSplash() {
            const randomIdx = Math.floor(Math.random() * splashes.length);
            splashEl.innerText = splashes[randomIdx];
        }

        function showMenu(message) {
            statusText.innerText = message;
            screen.style.display = "flex";
            gameState = "MENU";
            pauseBtn.innerText = "PAUSE";
        }

        function hideMenu() {
            screen.style.display = "none";
        }

        function resetPaddles() {
            player.y = (canvas.height - player.h) / 2;
            ai.y = (canvas.height - ai.h) / 2;
        }

        function resetBall() {
            const cfg = difficultyConfig[activeDifficulty];
            const direction = Math.random() > 0.5 ? 1 : -1;
            const launchAngle = (Math.random() * 0.8) - 0.4;

            ball.x = (canvas.width - ball.size) / 2;
            ball.y = (canvas.height - ball.size) / 2;
            ball.vx = direction * cfg.ballStartSpeed;
            ball.vy = launchAngle * cfg.ballStartSpeed;
        }

        function startGame() {
            hideMenu();
            pauseBtn.innerText = "PAUSE";
            if (resetOnStart) {
                stats = { wins: 0, losses: 0, hits: 0 };
                renderStats();
                resetOnStart = false;
            }
            resetPaddles();
            resetBall();
            ensureAudioContext();
            beginServeCountdown();
        }

        function togglePause() {
            if (gameState === "MENU") return;
            if (gameState === "PLAYING") {
                gameState = "PAUSED";
                pauseBtn.innerText = "RESUME";
            } else if (gameState === "PAUSED") {
                pauseBtn.innerText = "PAUSE";
                beginServeCountdown();
            }
        }

        function restartMatch() {
            stats = { wins: 0, losses: 0, hits: 0 };
            renderStats();
            setRandomSplash();
            // UPDATED TEXT HERE
            showMenu("Ready to play? Press START.");
            resetPaddles();
            resetBall();
        }

        function movePlayerWithControls() {
            let delta = 0;
            if (controls.up || controls.touchUp) delta -= player.speed;
            if (controls.down || controls.touchDown) delta += player.speed;

            if (delta !== 0) {
                player.y = Math.max(0, Math.min(canvas.height - player.h, player.y + delta));
            }
        }

        function checkCollision(paddle, isPlayer, maxBallSpeed) {
            const collides =
                ball.x < paddle.x + paddle.w &&
                ball.x + ball.size > paddle.x &&
                ball.y < paddle.y + paddle.h &&
                ball.y + ball.size > paddle.y;

            if (!collides) return;

            const paddleCenter = paddle.y + paddle.h / 2;
            const ballCenter = ball.y + ball.size / 2;
            const normalizedHit = Math.max(-1, Math.min(1, (ballCenter - paddleCenter) / (paddle.h / 2)));
            const speed = Math.min(Math.hypot(ball.vx, ball.vy) * 1.04, maxBallSpeed);
            const bounceAngle = normalizedHit * 1.15;

            ball.vx = (isPlayer ? 1 : -1) * Math.max(4.2, speed * Math.cos(bounceAngle));
            ball.vy = speed * Math.sin(bounceAngle);
            ball.x = isPlayer ? paddle.x + paddle.w : paddle.x - ball.size;

            if (isPlayer) {
                stats.hits += 1;
                updateBestStat("hits", stats.hits);
                renderStats();
                playTone(520, 0.05);
            } else {
                playTone(440, 0.05);
            }
            triggerShake();
        }

        function update() {
            if (gameState !== "PLAYING") return;

            movePlayerWithControls();
            ball.x += ball.vx;
            ball.y += ball.vy;

            if (ball.y <= 0 || ball.y + ball.size >= canvas.height) {
                ball.vy *= -1;
                ball.y = ball.y <= 0 ? 0 : canvas.height - ball.size;
            }

            const cfg = difficultyConfig[activeDifficulty];
            const aiCenter = ai.y + ai.h / 2;
            const ballCenter = ball.y + ball.size / 2;

            if (aiCenter < ballCenter - 10) ai.y += cfg.aiSpeed;
            else if (aiCenter > ballCenter + 10) ai.y -= cfg.aiSpeed;

            ai.y = Math.max(0, Math.min(canvas.height - ai.h, ai.y));

            checkCollision(player, true, cfg.maxBallSpeed);
            checkCollision(ai, false, cfg.maxBallSpeed);

            if (ball.x > canvas.width) {
                stats.wins += 1;
                updateBestStat("wins", stats.wins);
                renderStats();
                playTone(700, 0.08);
                triggerShake();
                const target = getMatchTarget();
                if (target && stats.wins >= target) {
                    resetOnStart = true;
                    setRandomSplash();
                    showMenu("You win! Press START for a new match.");
                    resetPaddles();
                    resetBall();
                    return;
                }
                resetBall();
                beginServeCountdown();
            }

            if (ball.x + ball.size < 0) {
                stats.losses += 1;
                stats.wins = 0;
                stats.hits = 0;
                renderStats();
                playTone(240, 0.12, "sawtooth", 0.04);
                setRandomSplash();
                showMenu("You lost. Press START to play again.");
                resetPaddles();
                resetBall();
            }
        }

        function drawPaddle(x, y) {
            if (ironImg.complete && ironImg.naturalWidth > 0) {
                for (let i = 0; i < 4; i++) {
                    ctx.drawImage(ironImg, x, y + (i * 32), 32, 32);
                }
                return;
            }

            ctx.fillStyle = "#d8d8d8";
            ctx.fillRect(x, y, 32, 128);
            ctx.strokeStyle = "#8a8a8a";
            ctx.strokeRect(x, y, 32, 128);
        }

        function drawBall() {
            if (snowballImg.complete && snowballImg.naturalWidth > 0) {
                ctx.drawImage(snowballImg, ball.x, ball.y, ball.size, ball.size);
                return;
            }

            ctx.fillStyle = "#ffffff";
            ctx.beginPath();
            ctx.arc(ball.x + ball.size / 2, ball.y + ball.size / 2, ball.size / 2, 0, Math.PI * 2);
            ctx.fill();
        }

        function drawPauseOverlay() {
            ctx.fillStyle = "rgba(0, 0, 0, 0.45)";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "#ffff55";
            ctx.font = "bold 42px Courier New";
            ctx.textAlign = "center";
            ctx.fillText("PAUSED", canvas.width / 2, canvas.height / 2);
        }

        function bindHoldButton(button, controlKey) {
            button.addEventListener("pointerdown", (e) => {
                controls[controlKey] = true;
                e.preventDefault();
            });

            const releaseEvents = ["pointerup", "pointerleave", "pointerout", "pointercancel"];
            releaseEvents.forEach((eventName) => {
                button.addEventListener(eventName, () => {
                    controls[controlKey] = false;
                });
            });
        }

        function toggleMute() {
            audioEnabled = !audioEnabled;
            settings.audioEnabled = audioEnabled;
            saveSettings();
            applySettingsToUI();
            if (audioEnabled) playTone(520, 0.06);
        }

        function resetBestStats() {
            const ok = confirm("Reset best stats? This cannot be undone.");
            if (!ok) return;
            bestStats = { wins: 0, hits: 0 };
            saveBestStats();
            renderStats();
        }

        startBtn.addEventListener("click", startGame);
        pauseBtn.addEventListener("click", togglePause);
        restartBtn.addEventListener("click", restartMatch);
        muteBtn.addEventListener("click", toggleMute);
        resetBestBtn.addEventListener("click", resetBestStats);

        difficultySelect.addEventListener("change", (e) => {
            activeDifficulty = e.target.value;
            settings.difficulty = activeDifficulty;
            saveSettings();
            resetBall();
        });

        modeSelect.addEventListener("change", (e) => {
            matchTarget = e.target.value;
            settings.matchTarget = matchTarget;
            saveSettings();
        });

        canvas.addEventListener("mousemove", (e) => {
            if (gameState !== "PLAYING") return;
            const rect = canvas.getBoundingClientRect();
            player.y = Math.max(0, Math.min(canvas.height - player.h, (e.clientY - rect.top) - player.h / 2));
        });

        document.addEventListener("keydown", (e) => {
            const tag = e.target.tagName;
            if (tag === "INPUT" || tag === "SELECT" || tag === "TEXTAREA" || tag === "BUTTON") return;

            if (e.key === "ArrowUp" || e.key === "w" || e.key === "W") {
                controls.up = true;
                e.preventDefault();
            }
            if (e.key === "ArrowDown" || e.key === "s" || e.key === "S") {
                controls.down = true;
                e.preventDefault();
            }
            if (e.key === " ") {
                togglePause();
                e.preventDefault();
            }
            if (e.key === "m" || e.key === "M") {
                toggleMute();
                e.preventDefault();
            }
        });

        document.addEventListener("keyup", (e) => {
            if (e.key === "ArrowUp" || e.key === "w" || e.key === "W") controls.up = false;
            if (e.key === "ArrowDown" || e.key === "s" || e.key === "S") controls.down = false;
        });

        window.addEventListener("blur", () => {
            controls.up = false;
            controls.down = false;
            controls.touchUp = false;
            controls.touchDown = false;
            if (gameState === "PLAYING") {
                gameState = "PAUSED";
                pauseBtn.innerText = "RESUME";
            }
        });

        bindHoldButton(touchUpBtn, "touchUp");
        bindHoldButton(touchDownBtn, "touchDown");

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            drawPaddle(player.x, player.y);
            drawPaddle(ai.x, ai.y);
            drawBall();

            if (gameState === "PAUSED") drawPauseOverlay();

            update();
            requestAnimationFrame(draw);
        }

        normalizeSettings();
        applySettingsToUI();
        setRandomSplash();
        renderStats();
        showMenu("Too much bugs, I cannot fix, lol");
        resetPaddles();
        resetBall();
        draw();
    </script>
</body>
</html>
